<html>
<head>
    <meta charset="utf-8" />

          crossorigin="anonymous" />

    <style>
        html,
        body,
        div,
        span,
        applet,
        object,
        iframe,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p,
        blockquote,
        pre,
        a,
        abbr,
        acronym,
        address,
        big,
        cite,
        code,
        del,
        dfn,
        em,
        img,
        ins,
        kbd,
        q,
        s,
        samp,
        small,
        strike,
        strong,
        sub,
        sup,
        tt,
        var,
        b,
        u,
        i,
        center,
        dl,
        dt,
        dd,
        ol,
        ul,
        li,
        fieldset,
        form,
        label,
        legend,
        table,
        caption,
        tbody,
        tfoot,
        thead,
        tr,
        th,
        td,
        article,
        aside,
        canvas,
        details,
        embed,
        figure,
        figcaption,
        footer,
        header,
        hgroup,
        menu,
        nav,
        output,
        ruby,
        section,
        summary,
        time,
        mark,
        audio,
        video {
            margin: 0;
            padding: 0;
            border: 0;
            font: inherit;
            font-size: 100%;
            vertical-align: baseline;
        }

        html {
            line-height: 1;
        }

        ol,
        ul {
            list-style: none;
        }

        table {
            border-collapse: collapse;
            border-spacing: 0;
        }

        caption,
        th,
        td {
            text-align: left;
            font-weight: normal;
            vertical-align: middle;
        }

        q,
        blockquote {
            quotes: none;
        }

            q:before,
            q:after,
            blockquote:before,
            blockquote:after {
                content: "";
                content: none;
            }

        a img {
            border: none;
        }

        article,
        aside,
        details,
        figcaption,
        figure,
        footer,
        header,
        hgroup,
        main,
        menu,
        nav,
        section,
        summary {
            display: block;
        }

        html,
        button,
        input,
        select,
        textarea {
            color: #222;
        }

        html {
            font: 100% "Lucida Grande", Tahoma, Arial, Verdana, sans-serif;
            line-height: 1.4;
        }

        ::-moz-selection {
            background: #b3d4fc;
            text-shadow: none;
        }

        ::selection {
            background: #b3d4fc;
            text-shadow: none;
        }

        hr {
            display: block;
            height: 1px;
            border: 0;
            border-top: 1px solid #ccc;
            margin: 1em 0;
            padding: 0;
        }

        audio,
        canvas,
        img,
        video {
            vertical-align: middle;
        }

            canvas:full-screen {
                width: 100%;
                height: 100%;
            }

            canvas:-webkit-full-screen {
                width: 100%;
                height: 100%;
            }

            canvas:-moz-full-screen {
                width: 100%;
                height: 100%;
            }

            canvas:-ms-full-screen {
                width: 100%;
                height: 100%;
            }

            canvas:-o-full-screen {
                width: 100%;
                height: 100%;
            }

            canvas:full-screen {
                width: 100%;
                height: 100%;
            }

        fieldset {
            border: 0;
            margin: 0;
            padding: 0;
        }

        textarea {
            resize: vertical;
        }

        label {
            width: 180px;
            vertical-align: top;
        }

        body {
            background: #fff;
            color: #000;
        }

        canvas {
            cursor: pointer;
        }

        .blf-keys {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0;
        }

        .blf-key {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            border: 2px solid #ccc;
            min-width: 140px;
            font-size: 14px;
            transition: background-color 0.3s, border-color 0.3s;
        }

            .blf-key .blf-indicator {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                flex-shrink: 0;
                background-color: #ccc;
            }

            .blf-key.blf-idle {
                border-color: #28a745;
            }

                .blf-key.blf-idle .blf-indicator {
                    background-color: #28a745;
                }

            .blf-key.blf-ringing {
                border-color: #ffc107;
            }

                .blf-key.blf-ringing .blf-indicator {
                    background-color: #ffc107;
                    animation: blf-pulse 0.8s infinite;
                }

            .blf-key.blf-incall {
                border-color: #dc3545;
            }

                .blf-key.blf-incall .blf-indicator {
                    background-color: #dc3545;
                }

            .blf-key.blf-unknown {
                border-color: #6c757d;
            }

                .blf-key.blf-unknown .blf-indicator {
                    background-color: #6c757d;
                }

            .blf-key .blf-name {
                font-weight: 600;
            }

            .blf-key .blf-status {
                color: #555;
                font-size: 12px;
            }

        @keyframes blf-pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .col {
            padding: 10px;
        }

        .dialpad .number {
            position: relative;
            z-index: 2;
            padding: 15px 20px;
            color: #4d4d4d;
            font-weight: 300;
            font-size: 40px;
            background: #fff;
            height: 78px;
        }

        .dialpad .dials {
            margin: -1px 0 0 -1px;
            background: #1d1918;
            cursor: pointer;
        }

            .dialpad .dials:before,
            .dialpad .dials:after {
                content: "\0020";
                display: block;
                height: 0;
                overflow: hidden;
            }

            .dialpad .dials:after {
                clear: both;
            }

            .dialpad .dials .digits {
                float: left;
                width: 33.33%;
            }

                .dialpad .dials .digits p {
                    font-weight: 600;
                    padding: 15px 25px;
                    border-top: 1px solid #4d4d4d;
                    border-right: 1px solid #000;
                    border-bottom: 1px solid #000;
                    border-left: 1px solid #4d4d4d;
                }

                    .dialpad .dials .digits p strong {
                        font-size: 50px;
                        margin-right: 8px;
                        color: #fff;
                    }

                .dialpad .dials .digits:active {
                    background: #00caf2;
                    border-top-color: #b2f2ff;
                }

        .compact .dials .digits p {
            padding: 25px 15px;
        }

            .compact .dials .digits p strong {
                font-size: 30px;
            }

            .compact .dials .digits p sup {
                text-transform: uppercase;
                color: #c1c1c1;
            }

        .compact .dials .pad-action {
            background: #093;
        }

            .compact .dials .pad-action:active {
                background: #0c3;
            }

        .spinner {
            margin: 100px auto 0;
            width: 70px;
            text-align: center;
        }

            .spinner > div {
                width: 18px;
                height: 18px;
                background-color: #333;
                border-radius: 100%;
                display: inline-block;
                -webkit-animation: sk-bouncedelay 1.4s infinite ease-in-out both;
                animation: sk-bouncedelay 1.4s infinite ease-in-out both;
            }

            .spinner .bounce1 {
                -webkit-animation-delay: -0.32s;
                animation-delay: -0.32s;
            }

            .spinner .bounce2 {
                -webkit-animation-delay: -0.16s;
                animation-delay: -0.16s;
            }

        @-webkit-keyframes sk-bouncedelay {
            0%, 80%, 100% {
                -webkit-transform: scale(0);
            }

            40% {
                -webkit-transform: scale(1);
            }
        }

        @keyframes sk-bouncedelay {
            0%, 80%, 100% {
                -webkit-transform: scale(0);
                transform: scale(0);
            }

            40% {
                -webkit-transform: scale(1);
                transform: scale(1);
            }
        }
    </style>

    <script src="dist/libwebphone.js" type="text/javascript"></script>

    <script type="text/javascript">
        var config = {

                renderTargets: ["call_list"],
            },

                renderTargets: ["call_control"],

                    preferedDeviceIds: ["bnkZoip5H5kiNXBLV+YNGalX9r0kvfNjJsZcOkHPeQQ="],
                },
                videoinput: {
                    enabled: true,
                },
                renderTargets: [
                    "media_device",
                    {
                        root: {
                            elementId: "media_device_tweaked",
                        },
                        data: {
                            ringoutput: { show: false },
                            audiooutput: { show: false },

                    },
                ],
            },
            audioContext: {
                renderTargets: [
                    "audio_context",
                    {
                        root: { elementId: "audio_context_tweaked" },
                        data: {
                            input: { local: { show: false } },
                            output: { preview: { show: false } },
                        },
                    },
                ],
            },
            codecPreferences: {
                audio: [],
                video: []
            },            
            userAgent: {
                renderTargets: ["user_agent"],
                transport: {
                    sockets: ["wss://svr001-zone1.ucaas.cloud:5065"],
                    recovery_max_interval: 30,
                    recovery_min_interval: 2,
                },
                authentication: {
                    username: "",
                    password: "",
                    realm: "",
                },
                user_agent: {
                    //contact_uri: '',
                    //display_name: '',
                    instance_id: "8f1fa16a-1165-4a96-8341-785b1ef24f12",
                    no_answer_timeout: 60,
                    register: true,
                    register_expires: 300,
                    user_agent: "libwebphone 2.x - dev",
                },
            },
            videoCanvas: {
                canvas: "video_screen",
                renderTargets: ["video_controls"],
            },
            blf: {
                enabled: true,
                renderTargets: ["blf_default"],
                keys: [],
                subscribe_expires: 3600,
                resubscribe_delay: 1000,
                notify_timeout: 60000,
            },
        }; //End ofConfig

        var webphone = new libwebphone(config);
        webphone.on("userAgent.recieved.notify", (lwp, userAgent, data) => {
            let request = data.request;
            console.log(request.body);
        });
        webphone.on(
            "mediaDevices.getUserMedia.error",
            (lwp, mediaDevices, error) => {
                window.alert(error.message);
            }
        );
        webphone.on("userAgent.configuration.error", (lwp, userAgent, error) => {
            window.alert(error.message);
        });
        webphone.on("userAgent.call.invalid", (lwp, userAgent, number, ready) => {
            if (!ready) {
                window.alert(
                    "Webphone is not ready! Ensure you are connected and registered first."
                );
            } else {
                window.alert('Unable to start call to number "' + number + '"');
            }
        });
        webphone.on("userAgent.call.failed", (lwp, userAgent, error) => {
            window.alert(error.message);
        });
        //webphone.onAny((event, ...data) => console.log(event, data));

        webphone.on("blf.key.status.updated", (lwp, blf, key) => {
            console.log("BLF status update:", key.name, "->", key.status);
            renderBLFCustom();
        });

        webphone.on("blf.key.subscribed", (lwp, blf, key) => {
            console.log("BLF subscribed:", key.name);
            renderBLFCustom();
        });

        webphone.on("blf.key.unsubscribed", (lwp, blf, key) => {
            renderBLFCustom();
        });

        function renderBLFCustom() {
            const blf = webphone.getBLF();
            if (!blf) return;
            const container = document.getElementById("blf_custom");
            if (!container) return;
            const keys = blf.getKeys();
            const statusLabels = { idle: "Idle", ringing: "Ringing", incall: "In Call", unknown: "Unknown" };
            container.innerHTML = keys.map((key) => {
                const label = statusLabels[key.status] || key.status;
                return `<div class="blf-key blf-${key.status}">
                <span class="blf-indicator"></span>
                <span class="blf-name">${key.name}</span>
                <span class="blf-status">${label}</span>
              </div>`;
            }).join("");
        }
    </script>
</head>
<body>
    <div id="test"></div>
    <div class="container-fluid">
        <!-- User Agent-->
        <div class="row" style="border: solid;">
            <div class="col" style="border-right: dashed;">
                <div id="user_agent"></div>
            </div>
            <div class="col" style="border-right: dashed;">
                <div>
                    <button onclick="webphone.getUserAgent().start('user_q5eNt95vwv', 'cxNMVV2BD47J');">
                        Start Mahfuzel New Softphone (1009)
                    </button>
                </div>
                <div>
                    <button onclick="webphone.getUserAgent().start('user_743dJ3fuNj', '72aBcdBvQnz3');">
                        Start Multiple WebRTC (1008)
                    </button>
                </div>
            </div>
            <div class="col">
                <div id="user_agent_custom"></div>
                <script type="text/javascript">
            var template = `
                    <div>
                      {{#data.isConnected}}
                      {{#data.isRegistered}}
                      &#128512
                      {{/data.isRegistered}}
                      {{/data.isConnected}}

                      {{#data.isConnected}}
                      {{^data.isRegistered}}
                      &#128542
                      {{/data.isRegistered}}
                      {{/data.isConnected}}

                      {{^data.isConnected}}
                      {{^data.isRegistered}}
                      &#128561
                      {{/data.isRegistered}}
                      {{/data.isConnected}}
                    </div>`;
            var customTemplateConfig = {
              template: template,
              root: {
                elementId: "user_agent_custom",
              },
            };

            if (webphone.getUserAgent()) {
              webphone.getUserAgent().renderAddTarget(customTemplateConfig);
            }
                </script>
            </div>
        </div>

        <!-- Media Devices-->
        <div class="row" style="border: solid;">
            <div class="col" style="border-right: dashed;">
                <div id="media_device"></div>
            </div>
            <div class="col" style="border-right: dashed;">
                <div id="media_device_tweaked"></div>
            </div>
            <div class="col">
                <div id="media_device_custom"></div>
                <script type="text/javascript">
            var template = `
              <div>
                <legend>{{i18n.legend}}</legend>

                {{#data.loaded}}
                  <div>
                    <label for="ringoutput">
                      {{i18n.ringoutput}}
                    </label>
                    <fieldset id="ringoutput">
                      {{#data.ringoutput.devices}}
                        {{#connected}}
                          <div><input type="radio" value="{{id}}" name="{{by_name.ringoutputselector.elementName}}" {{#selected}}checked{{/selected}}>{{name}}</input></div>
                        {{/connected}}
                      {{/data.ringoutput.devices}}
                    </fieldset>
                  </div>

                  <br>

                  <div>
                    <label for="audiooutput">
                      {{i18n.audiooutput}}
                    </label>
                    <fieldset id="audiooutput">
                      {{#data.audiooutput.devices}}
                        {{#connected}}
                          <div><input type="radio" value="{{id}}" name="{{by_name.audiooutputselector.elementName}}" {{#selected}}checked{{/selected}}>{{name}}</input></div>
                        {{/connected}}
                      {{/data.audiooutput.devices}}
                    </fieldset>
                  </div>

                  <br>

                  <div>
                    <label for="audioinput">
                      {{i18n.audioinput}}
                    </label>
                    {{#data.preview}}
                      <span id="{{by_id.audioinputpreview.elementId}}" style="width:300px;height:10px;background-color:lightgray;display:inline-block;">
                        <div style="height:10px; background-color: #00aeef;"></div>
                      </span>
                    {{/data.preview}}
                    <fieldset id="audioinput">
                      {{#data.audioinput.devices}}
                        {{#connected}}
                          <div><input type="radio" value="{{id}}" name="{{by_name.audiooinputselector.elementName}}" {{#selected}}checked{{/selected}}>{{name}}</input></div>
                        {{/connected}}
                      {{/data.audioinput.devices}}
                    </fieldset>
                  </div>

                  <br>

                  <div>
                    <label for="videoinput">
                      {{i18n.videoinput}}
                    </label>
                    <fieldset id="videoinput">
                      {{#data.videoinput.devices}}
                        {{#connected}}
                          <div><input type="radio" value="{{id}}" name="{{by_name.videoinputselector.elementName}}" {{#selected}}checked{{/selected}}>{{name}}</input></div>
                        {{/connected}}
                      {{/data.videoinput.devices}}
                    </fieldset>
                  </div>
                {{/data.loaded}}
              </div>
              `;

            var customConfig = {
              template: template,
              root: {
                elementId: "media_device_custom",
              },
              by_name: {
                ringoutputselector: {
                  events: {
                    onchange: (event) => {
                      const element = event.srcElement;
                      webphone
                        .getMediaDevices()
                        .changeDevice("ringoutput", element.value);
                    },
                  },
                },
                audiooutputselector: {
                  events: {
                    onchange: (event) => {
                      const element = event.srcElement;
                      webphone
                        .getMediaDevices()
                        .changeDevice("audiooutput", element.value);
                    },
                  },
                },
                audiooinputselector: {
                  events: {
                    onchange: (event) => {
                      const element = event.srcElement;
                      webphone
                        .getMediaDevices()
                        .changeDevice("audioinput", element.value);
                    },
                  },
                },
                videoinputselector: {
                  events: {
                    onchange: (event) => {
                      const element = event.srcElement;
                      webphone
                        .getMediaDevices()
                        .changeDevice("videoinput", element.value);
                    },
                  },
                },
              },
            };
            if (webphone.getMediaDevices()) {
              webphone.getMediaDevices().renderAddTarget(customConfig);
            }
                </script>
            </div>
        </div>

        <!-- Audio Mixer -->
        <div class="row" style="border: solid;">
            <div class="col" style="border-right: dashed;">
                <div id="audio_context"></div>
            </div>
            <div class="col" style="border-right: dashed;">
                <div id="audio_context_tweaked"></div>
            </div>
            <div class="col">
                <div id="audio_context_custom"></div>
                <script type="text/javascript">
            var template = `
              <div>
                <label for="{{by_id.mastervolume.elementId}}">
                  {{i18n.mastervolume}}
                </label>
                <input type="number" id="{{by_id.mastervolume.elementId}}" min="{{data.volume.min}}" max="{{data.volume.max}}" value="{{data.volumes.master}}">
              </div>
            `;
            var customConfig = {
              template: template,
              root: {
                elementId: "audio_context_custom",
              },
              by_id: {
                mastervolume: {
                  events: {
                    onchange: (event) => {
                      let element = event.srcElement;
                      let audioContext = webphone.getAudioContext();
                      if (audioContext) {
                        audioContext.changeVolume(
                          "master",
                          element.value / audioContext._config.volumeMax
                        );
                      }
                    },
                  },
                },
              },
            };
            if (webphone.getAudioContext()) {
              webphone.getAudioContext().renderAddTarget(customConfig);
            }
                </script>
            </div>
        </div>

        <!-- Dialpad -->

            <div class="col" style="border-right: dashed;">
                <div id="dialpad"></div>
            </div>
            <div class="col" style="border-right: dashed;">
                <div id="dialpad_custom_tweaked"></div>
            </div>
            <div class="col">
                <!-- Example dialpad from https://www.jqueryscript.net/other/Creating-A-Responsive-Phone-Dial-Pad-with-jQuery-CSS3-dialpad.html-->
                <div id="wrapper">
                    <div class="dialpad compact"
                         onkeypress="function(event) { if (event.keyCode == 13) { webphone.getDialpad().autoAction(); } }">
                        <div class="dials">
                            <ol>
                                <li class="digits" onclick="webphone.getDialpad().dial(1);">
                                    <p><strong>1</strong></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(2);">
                                    <p><strong>2</strong><sup>abc</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(3);">
                                    <p><strong>3</strong><sup>def</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(4);">
                                    <p><strong>4</strong><sup>ghi</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(5);">
                                    <p><strong>5</strong><sup>jkl</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(6);">
                                    <p><strong>6</strong><sup>mno</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(7);">
                                    <p><strong>7</strong><sup>pqrs</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(8);">
                                    <p><strong>8</strong><sup>tuv</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(9);">
                                    <p><strong>9</strong><sup>wxyz</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial('*');">
                                    <p><strong>*</strong></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial(0);">
                                    <p><strong>0</strong><sup>+</sup></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().dial('#');">
                                    <p><strong>#</strong></p>
                                </li>
                                <li class="digits" onclick="webphone.getDialpad().clear();">
                                    <p>
                                        <strong><i class="fa fa-refresh"></i></strong><sup>Clear</sup>
                                    </p>
                                </li>
                                <li class="digits"
                                    onclick="webphone.getDialpad().backspace();">
                                    <p>
                                        <strong><i class="fa fa-times"></i></strong><sup>Delete</sup>

                                </li>
                                <li class="digits pad-action"
                                    onclick="webphone.getDialpad().autoAction();">
                                    <p>
                                        <strong><i class="fa fa-phone"></i></strong>
                                        <sup id="dialpad_action">Call</sup>
                                    </p>
                                </li>
                            </ol>
                        </div>
                    </div>
                </div>
                <script type="text/javascript">
                    let callback = () => {
                        let color = "#093";
                        if (webphone.getDialpad()) {
                            switch (webphone.getDialpad().getAutoAction()) {
                                case "answer":
                                    document.getElementById("dialpad_action").innerHTML =
                                        "Answer";
                                    break;
                                case "redial":
                                    document.getElementById("dialpad_action").innerHTML =
                                        "Redial";
                                    break;
                                case "call":
                                    document.getElementById("dialpad_action").innerHTML =
                                        "Call";
                                    break;
                                case "transfer":
                                    document.getElementById("dialpad_action").innerHTML =
                                        "Transfer";
                                    color = "#0000ffba";
                                    break;
                                case "terminate":
                                    document.getElementById("dialpad_action").innerHTML = "End";
                                    color = "#ff0000ba";
                                    break;
                            }
                        }

                        let elements = document.getElementsByClassName("pad-action");
                        for (let element of elements) {
                            element.style.background = color;
                        }
                    };
                    webphone.on("call.primary.update", callback);
                    webphone.on("dialpad.target.updated", callback);
                    callback();
                </script>
            </div>
        </div>

        <!-- BLF -->
        <div class="row" style="border: solid;" id="blf_row">
            <div class="col" style="border-right: dashed;">
                <strong>BLF (default render)</strong>
                <div id="blf_default"></div>
            </div>
            <div class="col" style="border-right: dashed;">
                <strong>BLF (custom render)</strong>
                <div id="blf_custom" class="blf-keys"></div>
                <script type="text/javascript">
                    if (webphone.getBLF()) {
                        renderBLFCustom();
                    }
                </script>
            </div>
            <div class="col">
                <strong>Add subscription</strong>
                <div style="margin-top: 8px; display: flex; flex-direction: column; gap: 6px; max-width: 240px;">
                    <input id="blf_adhoc_id" type="text" class="form-control form-control-sm" placeholder="Extension (e.g. 1004)" />
                    <input id="blf_adhoc_name" type="text" class="form-control form-control-sm" placeholder="Label (optional)" />
                    <div style="display: flex; gap: 6px;">
                        <button class="btn btn-sm btn-success" onclick="blfAdhocSubscribe()">Subscribe</button>
                        <button class="btn btn-sm btn-danger" onclick="blfAdhocUnsubscribe()">Remove</button>
                    </div>
                </div>
                <script type="text/javascript">
                    function blfAdhocSubscribe() {
                        const blf = webphone.getBLF();
                        if (!blf) return;
                        const id = document.getElementById("blf_adhoc_id").value.trim();
                        const name = document.getElementById("blf_adhoc_name").value.trim();
                        if (!id) return;
                        blf.addKey(id, name || id);
                        document.getElementById("blf_adhoc_id").value = "";
                        document.getElementById("blf_adhoc_name").value = "";
                        renderBLFCustom();
                    }

                    function blfAdhocUnsubscribe() {
                        const blf = webphone.getBLF();
                        if (!blf) return;
                        const id = document.getElementById("blf_adhoc_id").value.trim();
                        if (!id) return;
                        blf.removeKey(id);
                        document.getElementById("blf_adhoc_id").value = "";
                        document.getElementById("blf_adhoc_name").value = "";
                        renderBLFCustom();
                    }
                </script>
            </div>
        </div>
        <script type="text/javascript">
            if (!webphone.getBLF()) {
                document.getElementById("blf_row").style.display = "none";
            }
        </script>

        <!-- Call Control -->
        <div class="row" style="border: solid;">
            <div class="col" style="border-right: dashed;">
                <div id="call_control"></div>
            </div>
            <div class="col" style="border-right: dashed;"></div>
            <div class="col"></div>
        </div>

        <!-- Call List -->
        <div class="row" style="border: solid;">
            <div class="col">
                <div id="call_list"></div>
            </div>
        </div>

        <!-- Video Canvas -->
        <div class="row" style="border: solid;">
            <div class="col">
                <canvas id="video_screen" width="640" height="480"></canvas>
                <div id="video_controls"></div>
            </div>
        </div>
    </div>
</body>
</html>
